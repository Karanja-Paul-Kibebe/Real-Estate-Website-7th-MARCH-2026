<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EstateHub - Sign In</title>
<style>
body{margin:0;padding:0;font-family:Poppins;background:#f5f7fa;}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:20px 8%;background:white;box-shadow:0 4px 10px rgba(0,0,0,0.05);}
.navbar .logo{font-size:22px;font-weight:600;color:#2563eb;}
.navbar nav a{margin:0 15px;text-decoration:none;color:#333;font-weight:500;}
.container{display:flex;justify-content:center;align-items:center;height:90vh;}
.form-box{background:white;padding:40px 30px;border-radius:12px;box-shadow:0 15px 40px rgba(0,0,0,0.1);width:100%;max-width:400px;}
.form-box h2{text-align:center;margin-bottom:25px;color:#2563eb;}
.form-box input{width:100%;padding:12px;margin-bottom:15px;border-radius:6px;border:1px solid #ccc;}
.form-box button{width:100%;padding:12px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;font-size:16px;}
.form-box p{text-align:center;margin-top:15px;color:#666;font-size:14px;}
.form-box p a{color:#2563eb;text-decoration:none;}
</style>
</head>
<body>
<header class="navbar">
<div class="logo">EstateHub</div>
<nav>
<a href="index.html">Home</a>
<a href="properties.html">Properties</a>
<a href="agents.html">Agents</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<div class="container">
<div class="form-box">
<h2>Sign In</h2>
<form>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<button type="submit">Sign In</button>
<p>Don't have an account? <a href="signup.html">Sign Up</a></p>
</form>
</div>
</div>
</body>
</html>
